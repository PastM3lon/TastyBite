<h1>Add New Recipe</h1>

<form>

<label>Recipe Name:</label><br>
<input type="text" name="recipe_name" required>
<br><br>

<label>Recipe Page File Name:</label><br>
<input type="text" placeholder="example: Shawarma.html">
<br><br>

<label>Course:</label><br>
<select>
<option>Appetizers</option>
<option>Main Course</option>
<option>Dessert</option>
</select>

<h3>Ingredients</h3>

<label>Ingredient 1:</label><br>
<input type="text">
<br><br>

<label>Ingredient 2:</label><br>
<input type="text">
<br><br>

<label>Ingredient 3:</label><br>
<input type="text">
<br><br>

<h3>Description</h3>

<textarea rows="5" cols="40"></textarea>

<br><br>

<button type="submit">Add Recipe</button>

</form>
