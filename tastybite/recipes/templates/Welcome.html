{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To TastyBite</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #fffaf4;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            color: gray;
            font-size: 18px;
        }

        .buttons {
            margin-top: 30px;
        }

        a {
            padding: 15px 25px;
            margin: 10px;
            display: inline-block;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .login {
            background: #e63946;
            color: white;
        }

        .signup {
            background: #fde7cb;
            color: black;
        }
    </style>
</head>

<body>

    <h1>Welcome to TastyBite</h1>
    <p>Discover your next favorite recipe 🍽️</p>

    <div class="buttons">
        <a class="login" href="{% url 'auth' %}">Login</a>
        <a class="signup" href="{% url 'auth' %}">Sign Up</a>
    </div>

</body>

</html>
