<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel - Recipe Finder</title>
</head>

<body>

    <nav>
        <div class="nav-log">
            <h1>Recipe Finder</h1>
        </div>
        <div class="nav-links" align="right">
            <a href="../Recipes Page/Recipes.html">Home</a>
            <a href="../Search/Search.html">Search</a>
            <a href="../Favorites/Favorites.html">Favorites</a>
            <a href="../Admin/Admin.html">Admin Panel</a>
            <a href="../Sign Up/SignUp.html">Sign Up</a>
            <a href="../Log In/LogIn.html">Log In</a>
        </div>
    </nav>

    <hr>

    <main>

        <div class="add-recipe" align="center">
            <div class="admin-header">
                <h2>Add New Recipe</h2>
            </div>


            <div class="admin-form">
                <form>

                    <label>Recipe Name:</label>
                    <input type="text" name="recipe_name" required>
                    <br><br>

                    <label>Recipe Page File Name:</label>
                    <input type="text" placeholder="example: Shawarma.html">
                    <br><br>
                    <label>Recipe image:</label>
                    <input type="file" placeholder="example: Shawarma.html">
                    <br><br>

                    <label>Course:</label>
                    <select>
                        <option>Appetizers</option>
                        <option>Main Course</option>
                        <option>Dessert</option>
                    </select>

                    <h3>Ingredients</h3>

                    <label>Ingredient 1:</label>
                    <input type="text">
                    <br><br>

                    <label>Ingredient 2:</label>
                    <input type="text">
                    <br><br>

                    <label>Ingredient 3:</label>
                    <input type="text">
                    <br><br>

                    <h3>Instructions:</h3>

                    <textarea rows="5" cols="40"></textarea>

                    <br><br>

                    <button type="submit">Add Recipe</button>

                </form>
            </div>
        </div>

        <hr>


        <div class="existing-recipes">
            <h2>Existing Recipes</h2>

            <ul>
                <li><a href="../Shawarma/Shawarma.html">Shawarma</a> | <button>Edit</button> | <button>Delete</button></li>
                <li><a href="../Tacos/Tacos.html">Tacos</a> | <button>Edit</button> | <button>Delete</button></li>
                <li><a href="../SpaghettiCarbonara/SpaghettiCarbonara.html">Spaghetti Carbonara</a> | <button>Edit</button> |
                    <button>Delete</button>
                </li>
            </ul>
        </div>

    </main>
</body>

</html>
