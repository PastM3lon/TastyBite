{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To TastyBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #fffaf4;
            --text-dark: #2f1c12;
            --text-muted: #7f6f64;
            --accent: #e63946;
            --button-soft: #fde7cb;
            --button-soft-border: #f6d6b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
        }

        .page {
            min-height: 100vh;
            padding: 28px 42px 40px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-name {
            margin-top: 1px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        #logo {
            width: 34px;
            height: 34px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex: 0 0 auto;
        }

        .card {
            max-width: 980px;
            margin: 84px auto 0;
            text-align: center;
            padding: 24px 16px 0;
        }

        .icon svg {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .minititle {
            margin: 16px 0 0;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .title {
            margin: 18px 0 0;
            display: grid;
            gap: 10px;
            line-height: 0.95;
            font-size: clamp(3rem, 7vw, 6.1rem);
            letter-spacing: -0.06em;
            font-weight: 800;
        }

        .title2 {
            color: var(--accent);
        }

        .subheading {
            max-width: 790px;
            margin: 28px auto 0;
            color: var(--text-muted);
            font-size: clamp(1.05rem, 2vw, 1.35rem);
            line-height: 1.55;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .LogInButton,
        .SignUpButton {
            min-width: 240px;
            padding: 20px 28px;
            font-size: 1.05rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .LogInButton {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 16px 28px rgba(230, 57, 70, 0.25);
        }

        .LogInButton:hover {
            background: #d62839;
            transform: translateY(-2px);
        }

        .SignUpButton {
            background: var(--button-soft);
            color: var(--text-dark);
            border: 1px solid var(--button-soft-border);
        }

        .SignUpButton:hover {
            background: #f9d8b0;
            transform: translateY(-2px);
        }
    </style>
</head>
